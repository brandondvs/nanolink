apiVersion: dashboard.grafana.app/v1beta1
kind: Dashboard
metadata:
  annotations:
    grafana.app/folder: ""
    grafana.app/saved-from-ui: Grafana v12.4.2 (ebade4c739)
  labels: {}
  name: adxzfwd
  namespace: default
spec:
  annotations:
    list:
    - builtIn: 1
      datasource:
        type: grafana
        uid: "-- Grafana --"
      enable: true
      hide: true
      iconColor: rgba(0, 211, 255, 1)
      name: Annotations & Alerts
      type: dashboard
  editable: true
  fiscalYearStartMonth: 0
  graphTooltip: 0
  links: []
  panels:
  - datasource:
      type: prometheus
      uid: PBFA97CFB590B2093
    fieldConfig:
      defaults:
        color:
          mode: thresholds
        mappings: []
        thresholds:
          mode: absolute
          steps:
          - color: green
            value: 0
          - color: red
            value: 80
      overrides: []
    gridPos:
      h: 8
      w: 12
      x: 0
      "y": 0
    id: 2
    options:
      colorMode: value
      graphMode: area
      justifyMode: auto
      orientation: auto
      percentChangeColorMode: standard
      reduceOptions:
        calcs:
        - lastNotNull
        fields: ""
        values: false
      showPercentChange: false
      textMode: auto
      wideLayout: true
    pluginVersion: 12.4.2
    targets:
    - editorMode: code
      expr: group by(status) (rate(http_requests_total{job="fastapi"}[$__rate_interval])) > 0
      legendFormat: __auto
      range: true
      refId: A
    title: Requests By Status Code
    type: stat
  - datasource:
      type: prometheus
      uid: PBFA97CFB590B2093
    fieldConfig:
      defaults:
        color:
          mode: palette-classic
        custom:
          axisBorderShow: false
          axisCenteredZero: false
          axisColorMode: text
          axisLabel: ""
          axisPlacement: auto
          barAlignment: 0
          barWidthFactor: 0.6
          drawStyle: line
          fillOpacity: 0
          gradientMode: none
          hideFrom:
            legend: false
            tooltip: false
            viz: false
          insertNulls: false
          lineInterpolation: linear
          lineWidth: 1
          pointSize: 5
          scaleDistribution:
            type: linear
          showPoints: auto
          showValues: false
          spanNulls: false
          stacking:
            group: A
            mode: none
          thresholdsStyle:
            mode: "off"
        mappings: []
        thresholds:
          mode: absolute
          steps:
          - color: green
            value: 0
          - color: red
            value: 80
      overrides: []
    gridPos:
      h: 14
      w: 24
      x: 0
      "y": 8
    id: 1
    options:
      legend:
        calcs: []
        displayMode: list
        placement: bottom
        showLegend: true
      tooltip:
        hideZeros: false
        mode: single
        sort: none
    pluginVersion: 12.4.2
    targets:
    - datasource:
        type: prometheus
        uid: PBFA97CFB590B2093
      editorMode: code
      expr: rate(http_requests_total{job="fastapi"}[$__rate_interval]) > 0
      legendFormat: __auto
      range: true
      refId: A
    title: HTTP Requests
    type: timeseries
  preload: false
  schemaVersion: 42
  tags:
  - app
  templating:
    list: []
  time:
    from: now-5m
    to: now
  timepicker: {}
  timezone: browser
  title: NanoLink
  weekStart: ""
